services:

  db:
    image: "mongo:8.2.6-rc0"
    container_name: db
    ports:
      - "4000:27017"
    restart: always

  azure-storage:
    image: "azure-storage:latest"
    build:
      context: ./azure-storage
      dockerfile: Dockerfile
    container_name: video-storage
    ports:
      - "4001:80"
    env_file:
      - "./azure-storage/.env"
    environment:
      - PORT=80
    restart: "no"

  video-streaming:
    image: "video-streaming:latest"
    build:
      context: ./video-streaming
      dockerfile: Dockerfile
    container_name: video-streaming
    ports:
      - "4002:80"
    env_file:
      - "./video-streaming/.env"
    environment:
      - PORT=80
      - DBHOST=mongodb://db:27017
      - DBNAME=video-streaming
      - VIDEO_STORAGE_HOST=video-storage
      - VIDEO_STORAGE_PORT=80
    restart: "no"

